name: app_ventiladores
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Dependencias agregadas para base de datos y Bluetooth
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # --- 1. LIBRERÍA PARA EL ÍCONO AGREGADA AQUÍ ---
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # --- 2. CARPETA ASSETS LIBERADA ---
  # Al dejar solo "assets/", Flutter leerá cualquier imagen (logo, kiros y el ícono) 
  # sin necesidad de escribir el nombre de cada una.
  assets:
    - assets/

# --- 3. CONFIGURACIÓN DEL ÍCONO DE LA APP ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icono_app.png"